[build]
  publish = "."

# Pretty URL handling — both /capabilities and /capabilities.html work
[[redirects]]
  from = "/capabilities"
  to = "/capabilities.html"
  status = 200

[[redirects]]
  from = "/accreditation"
  to = "/accreditation.html"
  status = 200

[[redirects]]
  from = "/m365-e7"
  to = "/m365-e7.html"
  status = 200

[[redirects]]
  from = "/partnering"
  to = "/partnering.html"
  status = 200

[[redirects]]
  from = "/about"
  to = "/about.html"
  status = 200

[[redirects]]
  from = "/engage"
  to = "/engage.html"
  status = 200

[[redirects]]
  from = "/contact"
  to = "/engage.html"
  status = 301

[[redirects]]
  from = "/how-we-work"
  to = "/accreditation.html"
  status = 301

[[redirects]]
  from = "/methodology"
  to = "/accreditation.html"
  status = 301

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Cache static assets aggressively
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_shared.css"
  [headers.values]
    Cache-Control = "public, max-age=86400"
